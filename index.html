<div class="container">

  <h1>🎮 Playnix</h1>
  <p>تحقق من إمكانية تشغيل الألعاب على جهازك</p>

  <label>المعالج (CPU)</label>
  <select id="cpu">
    <option value="">اختر المعالج</option>
  </select>

  <label>كرت الشاشة (GPU)</label>
  <select id="gpu">
    <option value="">اختر كرت الشاشة</option>
  </select>

  <label>الرام (RAM)</label>
  <select id="ram">
    <option value="4">4GB</option>
    <option value="8">8GB</option>
    <option value="16">16GB</option>
    <option value="32">32GB</option>
    <option value="64">64GB</option>
  </select>

  <label>اللعبة</label>
  <select id="game">
    <option value="">اختر اللعبة</option>
  </select>

  <button onclick="checkGame()">
    فحص اللعبة
  </button>

  <div id="result"></div>

</div>

<label>البحث عن المعالج</label>
<input
  type="text"
  id="cpuSearch"
  placeholder="اكتب اسم المعالج..."
  onkeyup="filterCPU()"
/>

<select id="cpu">
  <option value="">اختر المعالج</option>
</select>

<label>البحث عن كرت الشاشة</label>
<input
  type="text"
  id="gpuSearch"
  placeholder="اكتب اسم كرت الشاشة..."
  onkeyup="filterGPU()"
/>

<select id="gpu">
  <option value="">اختر كرت الشاشة</option>
</select>
